<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Caribbean ATC Pro - Le guide complet des aéroports et vols caribéens. 28 aéroports, 20 compagnies aériennes, 200+ routes en temps réel.">
    <meta name="keywords" content="aéroports caribéens, vols Caraïbes, horaires aériens, aviation caribéenne, réservation vol">
    <meta name="theme-color" content="#080c16">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%2300c2ff'>✈</text></svg>">
    <title>Caribbean ATC Pro - Guide des Aéroports et Vols Caribéens</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080c16;
            --bg-secondary: #0f1421;
            --accent-blue: #00c2ff;
            --accent-purple: #7b61ff;
            --accent-green: #00d68f;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --border: #1e2139;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: var(--accent-purple);
        }

        /* Header & Navigation */
        header {
            background: linear-gradient(180deg, rgba(8,12,22,0.95) 0%, rgba(15,20,33,0.8) 100%);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .logo::before {
            content: '✈';
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            font-size: 0.95rem;
            color: var(--text-secondary);
            transition: all 0.2s;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
        }

        nav a:hover,
        nav a.active {
            color: var(--accent-blue);
            background: rgba(0, 194, 255, 0.1);
        }

        /* Main Content */
        main {
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
        }

        .container {
            width: 100%;
        }

        /* Breadcrumbs */
        .breadcrumbs {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .breadcrumbs a {
            color: var(--accent-blue);
        }

        .breadcrumbs span {
            color: var(--text-secondary);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, rgba(0, 194, 255, 0.05) 0%, rgba(123, 97, 255, 0.05) 100%);
            border-radius: 1rem;
            border: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Stats Bar */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        /* Grid Layouts */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s;
            cursor: pointer;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 0 20px rgba(0, 194, 255, 0.1);
        }

        .card a {
            display: block;
            height: 100%;
        }

        .airport-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .airport-code {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
        }

        .type-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .type-hub {
            background: rgba(0, 194, 255, 0.2);
            color: var(--accent-blue);
        }

        .type-intl {
            background: rgba(123, 97, 255, 0.2);
            color: var(--accent-purple);
        }

        .type-regional {
            background: rgba(0, 214, 143, 0.2);
            color: var(--accent-green);
        }

        .airport-info {
            margin-bottom: 0.5rem;
        }

        .airport-city {
            font-weight: 600;
            color: var(--text-primary);
        }

        .airport-country {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .airport-flag {
            margin-right: 0.5rem;
        }

        .airport-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        /* Route Cards */
        .route-card {
            padding: 1.5rem;
        }

        .route-main {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .route-airport {
            flex: 1;
        }

        .route-code {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
        }

        .route-city {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .route-arrow {
            color: var(--accent-purple);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .route-airlines {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .airline-chip {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 194, 255, 0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 0.25rem;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue);
        }

        /* Search & Filter */
        .search-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.1);
        }

        .filter-select {
            padding: 0.75rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* Detail Pages */
        .detail-header {
            display: flex;
            align-items: baseline;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-code {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            font-family: 'JetBrains Mono', monospace;
        }

        .detail-name {
            flex: 1;
        }

        .detail-name h1 {
            font-size: 1.8rem;
            margin-bottom: 0.25rem;
        }

        .detail-subtitle {
            color: var(--text-secondary);
        }

        /* Two Column Layout */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 768px) {
            .two-col {
                grid-template-columns: 1fr;
            }
        }

        /* Section */
        .section {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: var(--accent-blue);
        }

        .section h3 {
            font-size: 1.1rem;
            margin-bottom: 0.75rem;
            margin-top: 1rem;
        }

        .section p {
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .info-item {
            border-left: 2px solid var(--accent-blue);
            padding-left: 1rem;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .info-value {
            font-weight: 600;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-green);
        }

        /* Map */
        .map-container {
            border-radius: 0.75rem;
            overflow: hidden;
            height: 300px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        #map {
            height: 100%;
            background: var(--bg);
        }

        .leaflet-control-zoom {
            border: 1px solid var(--border) !important;
        }

        .leaflet-control-zoom a {
            background: var(--bg-secondary) !important;
            color: var(--accent-blue) !important;
            border: 1px solid var(--border) !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--accent-blue) !important;
            color: var(--bg) !important;
        }

        /* FIDS Board */
        .fids-board {
            background: var(--bg);
            border-radius: 0.5rem;
            padding: 0;
            overflow: hidden;
        }

        .fids-header {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            color: var(--bg);
            padding: 1rem;
            font-weight: 600;
            text-align: center;
        }

        .fids-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .fids-row {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
        }

        .fids-row:last-child {
            border-bottom: none;
        }

        .fids-flight {
            flex: 1;
        }

        .fids-time {
            color: var(--accent-green);
            font-weight: 600;
            min-width: 80px;
            text-align: right;
        }

        .fids-status {
            color: var(--accent-blue);
            margin-left: 1rem;
            text-align: right;
            min-width: 80px;
        }

        /* SEO Content */
        .seo-content {
            background: rgba(0, 194, 255, 0.05);
            border-left: 3px solid var(--accent-blue);
            padding: 1rem;
            border-radius: 0.5rem;
            margin: 1.5rem 0;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-secondary);
        }

        /* Footer */
        footer {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            padding: 2rem;
            margin-top: 3rem;
            text-align: center;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--accent-blue);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            }

            nav {
                gap: 1rem;
            }

            nav a {
                padding: 0.5rem;
                font-size: 0.85rem;
            }

            main {
                padding: 1rem;
            }

            .detail-header {
                flex-direction: column;
            }

            .stats {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Utility */
        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

        class Router {
            constructor() {
                this.currentPage = null;
                this.currentParams = null;
                this.parseRoute();
                window.addEventListener('hashchange', () => this.parseRoute());
            }

            parseRoute() {
                const hash = window.location.hash.slice(1) || '/';
                const [page, ...params] = hash.split('/').filter(Boolean);

                this.currentPage = page || 'home';
                this.currentParams = params.length > 0 ? params : null;

                this.render();
                this.updateNav();
                window.scrollTo(0, 0);
            }

            render() {
                const app = document.getElementById('app');
                app.innerHTML = '';
                app.classList.add('fade-in');

                switch(this.currentPage) {
                    case 'home':
                    case '':
                        app.appendChild(renderHome());
                        break;
                    case 'airports':
                        app.appendChild(renderAirportDirectory());
                        break;
                    case 'airport':
                        app.appendChild(renderAirportDetail(this.currentParams[0]));
                        break;
                    case 'routes':
                        app.appendChild(renderRouteDirectory());
                        break;
                    case 'route':
                        app.appendChild(renderRouteDetail(this.currentParams[0], this.currentParams[1]));
                        break;
                    default:
                        app.appendChild(renderHome());
                }
            }

            updateNav() {
                document.querySelectorAll('nav a').forEach(link => {
                    link.classList.remove('active');
                    const page = link.getAttribute('data-page');
                    if (page === this.currentPage || (this.currentPage === '' && page === 'home')) {
                        link.classList.add('active');
                    }
                });
            }
        }

                <div class="seo-content">
                    <h3 style="color: var(--accent-blue); margin-bottom: 1rem;">Vol ${from.toUpperCase()} - ${to.toUpperCase()}</h3>
                    <p>Le vol reliant ${fromAirport.c} (${from.toUpperCase()}) à ${toAirport.c} (${to.toUpperCase()}) est l'une des routes majeures de la Caraïbe. Avec une distance de ${distance.toFixed(0)} km et une durée de vol estimée de ${duration}h, cette route offre ${operatingAirlines.length} options de compagnies aériennes.</p>
                    <p style="margin-top: 0.75rem;">${operatingAirlines.length > 0 ? `Les principales compagnies opérant cette route incluent ${operatingAirlines.slice(0, 3).map(a => a.n).join(', ')}, offrant plusieurs connexions quotidiennes.` : 'Cette route est desservie par plusieurs compagnies aériennes.'} Les tarifs et horaires varient selon la saison et l'entreprise aérienne sélectionnée.</p>
                </div>
            `;

            setTimeout(() => {
                initializeRouteMap(fromAirport, toAirport);
            }, 0);

            return div;
        }

        // ============= HELPER RENDER FUNCTIONS =============

        function renderAirportGrid(airports) {
            return `<div class="grid">${airports.map(a => `
                <div class="card" onclick="navigateTo('/airport/${a.i}')">
                    <a href="#/airport/${a.i}">
                        <div class="airport-card-header">
                            <div class="airport-code">${a.i}</div>
                            <span class="type-badge type-${a.t}">${a.t === 'hub' ? 'HUB' : a.t === 'intl' ? 'INTL' : 'REG'}</span>
                        </div>
                        <div class="airport-info">
                            <div class="airport-city">${a.n.split(' ')[0]} - ${a.c}</div>
                            <div class="airport-country"><span class="airport-flag">${a.co.split(' ')[1] || '🌍'}</span>${a.co.split(' ')[0]}</div>
                        </div>
                        <div class="airport-meta">
                            <span>${(a.px / 1000000).toFixed(1)}M pax</span>
                            <span>${a.mv.toLocaleString()} mvt</span>
                        </div>
                    </a>
                </div>
            `).join('')}</div>`;
        }

        function renderRouteGrid(routes) {
            return `<div class="grid">${routes.map(r => `
                <div class="card" onclick="navigateTo('/route/${r.from}-${r.to}')">
                    <a href="#/route/${r.from}-${r.to}">
                        <div class="route-card">
                            <div class="route-main">
                                <div class="route-airport">
                                    <div class="route-code">${r.from}</div>
                                    <div class="route-city">${AIRPORTS.find(a => a.i === r.from)?.c || r.from}</div>
                                </div>
                                <div class="route-arrow">→</div>
                                <div class="route-airport">
                                    <div class="route-code">${r.to}</div>
                                    <div class="route-city">${AIRPORTS.find(a => a.i === r.to)?.c || r.to}</div>
                                </div>
                            </div>
                            <div class="route-airlines">
                                ${r.airlines.slice(0, 3).map(ac => `<span class="airline-chip">${ac}</span>`).join('')}
                                ${r.airlines.length > 3 ? `<span class="airline-chip">+${r.airlines.length - 3}</span>` : ''}
                            </div>
                        </div>
                    </a>
                </div>
            `).join('')}</div>`;
        }

        // ============= DATA GENERATION =============

        function generateAllRoutes() {
            const routes = new Set();
            AIRLINES.forEach(airline => {
                airline.routes.forEach(route => {
                    const [from, to] = route.split('→');
                    routes.add(`${from}-${to}`);
                });
            });

            return Array.from(routes).map(routeStr => {
                const [from, to] = routeStr.split('-');
                const airlines = AIRLINES.filter(al => al.routes.includes(`${from}→${to}`)).map(al => al.c);
                return { from, to, airlines };
            }).sort((a, b) => a.from.localeCompare(b.from));
        }

        function generateRoutesForAirport(iata) {
            const routes = generateAllRoutes();
            return routes.filter(r => r.from === iata || r.to === iata);
        }

        function generateFIDSBoard(type, iata) {
            const flights = [];
            const statuses = ['ON TIME', 'DELAYED', 'BOARDING', 'DEPARTED', 'ARRIVED'];
            const hours = type === 'departures' ? [6, 8, 10, 12, 14, 16, 18, 20] : [7, 9, 11, 13, 15, 17, 19, 21];

            for (let i = 0; i < 5; i++) {
                const hour = hours[Math.floor(Math.random() * hours.length)];
                const minute = Math.floor(Math.random() * 60);
                const airline = AIRLINES[Math.floor(Math.random() * AIRLINES.length)];
                const flight = `${airline.c}${Math.floor(Math.random() * 9000) + 1000}`;
                const destination = AIRPORTS[Math.floor(Math.random() * AIRPORTS.length)].i;

                flights.push({
                    flight: type === 'departures' ? `${flight} → ${destination}` : `${airline.c}${Math.floor(Math.random() * 9000) + 1000}`,
                    time: `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`,
                    status: statuses[Math.floor(Math.random() * statuses.length)]
                });
            }
            return flights;
        }

        function generateRouteFlights(from, to) {
            const flights = [];
            const airlines = AIRLINES.filter(al => al.routes.includes(`${from.toUpperCase()}→${to.toUpperCase()}`));

            if (airlines.length === 0) return [];

            for (let i = 0; i < 3; i++) {
                const airline = airlines[i % airlines.length];
                const hour = 6 + (i * 4);
                const flight = `${airline.c}${(i + 1) * 100 + Math.floor(Math.random() * 99)}`;
                flights.push({
                    flight: flight,
                    time: `${String(hour).padStart(2, '0')}:${String(Math.floor(Math.random() * 60)).padStart(2, '0')}`,
                    status: i === 0 ? 'ON TIME' : i === 1 ? 'BOARDING' : 'DELAYED'
                });
            }
            return flights;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // ============= MAP FUNCTIONS =============

        function initializeMap(lat, lon, iata) {
            const mapElement = document.getElementById('map');
            if (!mapElement) return;

            try {
                const map = L.map('map').setView([lat, lon], 8);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(map);

                L.circleMarker([lat, lon], {
                    radius: 8,
                    fillColor: '#00c2ff',
                    color: '#00c2ff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(iata);
            } catch (e) {
                console.error('Map initialization error:', e);
            }
        }

        function initializeRouteMap(from, to) {
            const mapElement = document.getElementById('route-map');
            if (!mapElement) return;

            try {
                const map = L.map('route-map').setView([(from.la + to.la) / 2, (from.lo + to.lo) / 2], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(map);

                L.circleMarker([from.la, from.lo], {
                    radius: 8,
                    fillColor: '#00c2ff',
                    color: '#00c2ff',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(from.i);

                L.circleMarker([to.la, to.lo], {
                    radius: 8,
                    fillColor: '#00d68f',
                    color: '#00d68f',
                    weight: 2,
                    opacity: 1,
                    fillOpacity: 0.8
                }).addTo(map).bindPopup(to.i);

                L.polyline([[from.la, from.lo], [to.la, to.lo]], {
                    color: '#7b61ff',
                    weight: 2,
                    opacity: 0.7,
                    dashArray: '5, 5'
                }).addTo(map);

                map.fitBounds([[from.la, from.lo], [to.la, to.lo]], { padding: [50, 50] });
            } catch (e) {
                console.error('Route map initialization error:', e);
            }
        }

        // ============= INITIALIZATION =============

        window.navigateTo = navigateTo;
        const router = new Router();
    </script>
<script src="nav.js"></script>
</body>
</html>
