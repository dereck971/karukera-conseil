<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Suivi de vol en temps réel pour la Caraïbe. Recherchez un numéro de vol et suivez les avions live sur une carte interactive.">
    <meta name="theme-color" content="#080c16">
    <meta property="og:title" content="Suivi de vol Caraïbes — Caribbean ATC">
    <meta property="og:description" content="Suivi de vol en temps réel pour la Caraïbe. Recherchez un numéro de vol et suivez les avions live sur une carte interactive.">
    <meta property="og:type" content="website">

    <title>Suivi de vol Caraïbes — Caribbean ATC</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #080c16;
            --bg-secondary: #0d1321;
            --accent: #00c2ff;
            --secondary: #7b61ff;
            --green: #00d68f;
            --gray-700: #1e2130;
            --gray-600: #2a3142;
            --gray-400: #6b7280;
            --gray-300: #9ca3af;
            --gray-200: #e5e7eb;
            --gray-100: #f3f4f6;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--gray-100);
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Header & Search Section */
        .header {
            background: linear-gradient(to bottom, var(--bg-primary), transparent);
            padding: 24px 16px;
            z-index: 100;
            border-bottom: 1px solid var(--gray-700);
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .search-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
            text-align: center;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px;
            background-color: var(--bg-secondary);
            border: 2px solid var(--gray-700);
            border-radius: 12px;
            color: var(--gray-100);
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--gray-400);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.1);
        }

        /* Auto-suggest dropdown */
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--bg-secondary);
            border: 1px solid var(--gray-700);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 320px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            margin-top: -2px;
        }

        .suggestions-dropdown.active {
            display: block;
        }

        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--gray-700);
            transition: background-color 0.15s ease;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: var(--gray-700);
        }

        .suggestion-flight-number {
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        .suggestion-route {
            font-size: 13px;
            color: var(--gray-400);
            margin-left: 12px;
        }

        .suggestion-status {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-en-route {
            background-color: rgba(0, 194, 255, 0.2);
            color: var(--accent);
        }

        /* Main container */
        .main-content {
            flex: 1;
            display: flex;
            gap: 0;
            overflow: hidden;
            min-height: 0;
        }

        /* Map section */
        .map-container {
            flex: 1;
            position: relative;
            background-color: var(--bg-secondary);
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .leaflet-container {
            background-color: var(--bg-secondary);
            font-family: 'Inter', sans-serif;
        }

        .leaflet-control {
            background-color: var(--bg-secondary) !important;
            border: 1px solid var(--gray-700) !important;
            border-radius: 8px !important;
        }

        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out {
            background-color: var(--bg-secondary) !important;
            border: 1px solid var(--gray-700) !important;
            color: var(--accent) !important;
            font-weight: 600;
        }

        .leaflet-control-zoom-in:hover,
        .leaflet-control-zoom-out:hover {
            background-color: var(--gray-700) !important;
        }

        /* Flight detail card */
        .flight-detail-card {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--gray-700);
            border-radius: 12px;
            padding: 20px;
            max-width: 400px;
            display: none;
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-height: 60vh;
            overflow-y: auto;
        }

        .flight-detail-card.active {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .flight-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--gray-700);
            padding-bottom: 16px;
        }

        .flight-number-large {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .flight-number-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .airline-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .airline-name {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 500;
            text-transform: uppercase;
        }

        .airline-callsign {
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--gray-300);
        }

        .status-badge {
            font-size: 11px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-en-route {
            background-color: rgba(0, 194, 255, 0.2);
            color: var(--accent);
        }

        .status-approaching {
            background-color: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .status-boarding {
            background-color: rgba(123, 97, 255, 0.2);
            color: var(--secondary);
        }

        .status-departed {
            background-color: rgba(0, 214, 143, 0.2);
            color: var(--green);
        }

        .status-delayed {
            background-color: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Route section */
        .route-section {
            margin-bottom: 16px;
        }

        .route-title {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .route-display {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--gray-100);
        }

        .airport-code {
            font-weight: 600;
            color: var(--accent);
        }

        .airport-city {
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 2px;
        }

        .route-arrow {
            color: var(--secondary);
            font-weight: 700;
        }

        .times-display {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--gray-400);
            margin-top: 8px;
            font-family: 'Inter', sans-serif;
        }

        /* Progress bar */
        .progress-section {
            margin-bottom: 16px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--gray-400);
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: var(--gray-700);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--secondary), var(--accent));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* Flight data grid */
        .flight-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .data-item {
            background-color: var(--gray-700);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--gray-600);
        }

        .data-label {
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            font-family: 'JetBrains Mono', monospace;
        }

        .data-unit {
            font-size: 11px;
            color: var(--gray-400);
            margin-left: 4px;
        }

        /* Close button */
        .close-detail {
            background: none;
            border: none;
            color: var(--gray-400);
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .close-detail:hover {
            color: var(--accent);
            background-color: var(--gray-700);
        }

        /* Ticker */
        .ticker-container {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--gray-700);
            padding: 12px 0;
            overflow: hidden;
            height: auto;
            min-height: 60px;
        }

        .ticker-label {
            font-size: 11px;
            color: var(--gray-400);
            font-weight: 600;
            text-transform: uppercase;
            padding: 0 20px;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .ticker-content {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            overflow-x: auto;
            scroll-behavior: smooth;
            white-space: nowrap;
        }

        .ticker-content::-webkit-scrollbar {
            height: 4px;
        }

        .ticker-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .ticker-content::-webkit-scrollbar-thumb {
            background: var(--gray-700);
            border-radius: 2px;
        }

        .ticker-flight {
            flex-shrink: 0;
            padding: 8px 12px;
            background-color: var(--gray-700);
            border-radius: 6px;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }

        .ticker-flight:hover {
            border-color: var(--accent);
            background-color: rgba(0, 194, 255, 0.1);
        }

        .ticker-flight-number {
            color: var(--accent);
            font-weight: 600;
            display: block;
            margin-bottom: 2px;
        }

        .ticker-flight-route {
            color: var(--gray-400);
            font-size: 11px;
        }

        /* Footer */
        .footer {
            background-color: var(--bg-secondary);
            border-top: 1px solid var(--gray-700);
            padding: 12px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--gray-400);
        }

        .footer-link {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-link:hover {
            color: var(--gray-100);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 16px 12px;
            }

            .search-container {
                max-width: 100%;
            }

            .flight-detail-card {
                max-width: calc(100% - 40px);
                bottom: 70px;
                left: 20px;
                right: 20px;
            }

            .ticker-container {
                min-height: 70px;
            }

            .flight-data {
                grid-template-columns: 1fr;
            }
        }

        /* Plane marker styles */
        .plane-marker {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
        }

        /* Airport marker styles */
        .airport-marker {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background-color: var(--bg-secondary);
            box-shadow: 0 0 8px rgba(0, 194, 255, 0.4);
        }

        /* Loading state */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray-400);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--gray-400);
            padding: 40px 20px;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state-subtext {
            font-size: 14px;
            color: var(--gray-500);
        }
    </style>
</head>
<body>
    <!-- Header with search -->
    <div class="header">
        <div class="search-container">
            <div class="search-title">Suivi de Vol en Temps Réel</div>
            <div class="search-wrapper">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Entrez un numéro de vol... (ex: AF1234, TX3021)"
                    autocomplete="off"
                >
                <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="main-content">
        <div class="map-container">
            <div id="map"></div>
            <div id="flightDetailCard" class="flight-detail-card">
                <div class="flight-header">
                    <div class="flight-number-large">
                        <div class="flight-number-badge" id="detailFlightNumber">--</div>
                        <div class="airline-info">
                            <div class="airline-name" id="detailAirlineName">--</div>
                            <div class="airline-callsign" id="detailCallsign">--</div>
                        </div>
                    </div>
                    <button class="close-detail" id="closeDetailBtn">&times;</button>
                </div>

                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                    <span class="status-badge" id="detailStatus">EN ROUTE</span>
                </div>

                <div class="route-section">
                    <div class="route-title">Itinéraire</div>
                    <div class="route-display">
                        <div style="text-align: center;">
                            <div class="airport-code" id="detailOriginCode">--</div>
                            <div class="airport-city" id="detailOriginCity">--</div>
                        </div>
                        <div class="route-arrow">→</div>
                        <div style="text-align: center;">
                            <div class="airport-code" id="detailDestCode">--</div>
                            <div class="airport-city" id="detailDestCity">--</div>
                        </div>
                    </div>
                    <div class="times-display">
                        <div>Départ: <span id="detailDepartureTime">--:--</span></div>
                        <div>Arrivée: <span id="detailArrivalTime">--:--</span></div>
                    </div>
                </div>

                <div class="progress-section">
                    <div class="progress-label">
                        <span>Progression du vol</span>
                        <span id="detailProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="detailProgressBar" style="width: 0%;"></div>
                    </div>
                </div>

                <div class="flight-data">
                    <div class="data-item">
                        <div class="data-label">Altitude</div>
                        <div class="data-value">
                            <span id="detailAltitude">0</span>
                            <span class="data-unit">ft</span>
                        </div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Vitesse</div>
                        <div class="data-value">
                            <span id="detailSpeed">0</span>
                            <span class="data-unit">kt</span>
                        </div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Cap</div>
                        <div class="data-value">
                            <span id="detailHeading">0</span>
                            <span class="data-unit">°</span>
                        </div>
                    </div>
                    <div class="data-item">
                        <div class="data-label">Aircraft</div>
                        <div class="data-value" id="detailAircraft" style="font-size: 12px;">--</div>
                    </div>
                    <div class="data-item" style="grid-column: 1 / -1;">
                        <div class="data-label">Position GPS</div>
                        <div class="data-value" id="detailCoordinates" style="font-size: 12px; font-family: 'JetBrains Mono', monospace;">0.0000, 0.0000</div>
                    </div>
                    <div class="data-item" style="grid-column: 1 / -1;">
                        <div class="data-label">Passagers</div>
                        <div class="data-value" id="detailPassengers" style="font-size: 12px;">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Ticker -->
    <div class="ticker-container">
        <div class="ticker-label">✈ Vols Actifs</div>
        <div class="ticker-content" id="tickerContent"></div>
    </div>

    <!-- Footer -->
    <div class="footer">
        Powered by <a href="#" class="footer-link">Caribbean ATC Pro</a> • Suivi de vol en temps réel pour la Caraïbe
    </div>

            'AA': { name: 'American Airlines', callsign: 'AAL', color: '#ef4444' },
            'JB': { name: 'JetBlue', callsign: 'JBU', color: '#00c2ff' },
            'DL': { name: 'Delta', callsign: 'DAL', color: '#00c2ff' },
            'UA': { name: 'United', callsign: 'UAL', color: '#fbbf24' },
            'CM': { name: 'Copa', callsign: 'CMP', color: '#00d68f' },
            'CU': { name: 'Cubana', callsign: 'CUB', color: '#ef4444' },
            'NK': { name: 'Spirit', callsign: 'NKS', color: '#7b61ff' },
            'KL': { name: 'KLM', callsign: 'KLM', color: '#00c2ff' },
            'BA': { name: 'British Airways', callsign: 'BAW', color: '#fbbf24' },
            'AV': { name: 'Avianca', callsign: 'AVA', color: '#00d68f' },
            'WN': { name: 'Southwest', callsign: 'SWA', color: '#ef4444' }
        };

        const ROUTES = [
            { from: 'CDG', to: 'PTP', airline: 'AF' },
            { from: 'ORY', to: 'FDF', airline: 'TX' },
            { from: 'MIA', to: 'SJU', airline: 'AA' },
            { from: 'JFK', to: 'SDQ', airline: 'JB' },
            { from: 'ATL', to: 'BGI', airline: 'DL' },
            { from: 'LAX', to: 'AUA', airline: 'WN' },
            { from: 'ORY', to: 'PUJ', airline: 'OR' },
            { from: 'CDG', to: 'FDF', airline: 'AF' },
            { from: 'MIA', to: 'NAS', airline: 'AA' },
            { from: 'ORY', to: 'BGI', airline: 'SS' },
            { from: 'SAI', to: 'ANU', airline: '3S' },
            { from: 'MIA', to: 'HAV', airline: 'AA' },
            { from: 'ATL', to: 'KIN', airline: 'DL' },
            { from: 'ORY', to: 'SXM', airline: 'TX' },
            { from: 'MIA', to: 'CUR', airline: 'AA' },
            { from: 'ORY', to: 'UVF', airline: 'OR' },
            { from: 'MIA', to: 'POS', airline: 'JB' },
            { from: 'CDG', to: 'BGI', airline: 'AF' },
            { from: 'MIA', to: 'GND', airline: 'AA' },
            { from: 'ORY', to: 'GBJ', airline: 'TX' }
        ];

        const AIRCRAFT_TYPES = [
            'A320', 'A321', 'A350', 'B737', 'B787', 'E190', 'Q400', 'CRJ900', 'ATR72', 'B777'
        ];

        // ===== STATE =====
        let map;
        let flights = [];
        let selectedFlightNumber = null;
        let flightMarkers = {};
        let routePolylines = {};
        let airportMarkers = {};
        let animationFrameId;

        // ===== FLIGHT DATA GENERATION =====
        function generateFlights() {
            flights = [];
            const now = new Date();
            let flightNumber = 1000;

            for (let route of ROUTES) {
                const airline = AIRLINES[route.airline];
                const origin = AIRPORTS[route.from];
                const destination = AIRPORTS[route.to];

                if (!origin || !destination) continue;

                // Generate 1-2 flights per route
                const flightCount = Math.random() > 0.5 ? 2 : 1;

                for (let i = 0; i < flightCount; i++) {
                    const departureTime = new Date(now.getTime() + Math.random() * 12 * 60 * 60 * 1000);
                    const flightDuration = calculateDistance(origin.lat, origin.lng, destination.lat, destination.lng) / 450; // 450 km/h avg
                    const arrivalTime = new Date(departureTime.getTime() + flightDuration * 60 * 60 * 1000);

                    const flight = {
                        number: `${route.airline}${String(flightNumber).padStart(4, '0')}`,
                        airline: route.airline,
                        origin: route.from,
                        destination: route.to,
                        departureTime,
                        arrivalTime,
                        currentLat: origin.lat,
                        currentLng: origin.lng,
                        heading: calculateBearing(origin.lat, origin.lng, destination.lat, destination.lng),
                        altitude: Math.random() > 0.3 ? Math.random() * 43000 : 0,
                        speed: Math.random() > 0.3 ? 400 + Math.random() * 150 : 0,
                        aircraft: AIRCRAFT_TYPES[Math.floor(Math.random() * AIRCRAFT_TYPES.length)],
                        passengers: Math.floor(50 + Math.random() * 200),
                        progress: Math.random() * 100,
                        status: ['En route', 'Approche', 'Embarquement', 'Décollé', 'Retardé'][Math.floor(Math.random() * 5)]
                    };

                    flights.push(flight);
                    flightNumber++;
                }
            }

            return flights;
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // Earth's radius in km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const lat1Rad = lat1 * Math.PI / 180;
            const lat2Rad = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2Rad);
            const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function getInterpolatedPosition(flight) {
            const origin = AIRPORTS[flight.origin];
            const destination = AIRPORTS[flight.destination];
            const progress = flight.progress / 100;

            const interpolatedLat = origin.lat + (destination.lat - origin.lat) * progress;
            const interpolatedLng = origin.lng + (destination.lng - origin.lng) * progress;

            return { lat: interpolatedLat, lng: interpolatedLng };
        }

        // ===== SEARCH & FILTERING =====
        function filterFlights(query) {
            return flights.filter(f => f.number.toUpperCase().includes(query.toUpperCase()));
        }

        function updateSuggestions(query) {
            const dropdown = document.getElementById('suggestionsDropdown');
            const input = document.getElementById('searchInput');

            if (query.trim().length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            const filtered = filterFlights(query);

            if (filtered.length === 0) {
                dropdown.classList.remove('active');
                return;
            }

            dropdown.innerHTML = filtered.map(flight => {
                const originName = AIRPORTS[flight.origin]?.name || flight.origin;
                const destName = AIRPORTS[flight.destination]?.name || flight.destination;
                const route = `${flight.origin} → ${flight.destination}`;
                const statusClass = `status-${flight.status.toLowerCase().replace(/\s+/g, '-')}`;

                return `
                    <div class="suggestion-item" data-flight="${flight.number}">
                        <div style="display: flex; align-items: center; flex: 1;">
                            <span class="suggestion-flight-number">${flight.number}</span>
                            <span class="suggestion-route">${route}</span>
                        </div>
                        <span class="suggestion-status ${statusClass}">${flight.status}</span>
                    </div>
                `;
            }).join('');

            dropdown.classList.add('active');

            // Attach click handlers
            document.querySelectorAll('.suggestion-item').forEach(item => {
                item.addEventListener('click', () => {
                    const flightNumber = item.getAttribute('data-flight');
                    selectFlight(flightNumber);
                    input.value = flightNumber;
                    dropdown.classList.remove('active');
                });
            });
        }

        // ===== FLIGHT SELECTION & MAP =====
        function selectFlight(flightNumber) {
            selectedFlightNumber = flightNumber;
            const flight = flights.find(f => f.number === flightNumber);

            if (!flight) return;

            // Update detail card
            updateFlightDetail(flight);

            // Update map
            const pos = getInterpolatedPosition(flight);
            map.flyTo([pos.lat, pos.lng], 8, { duration: 0.5 });

            // Show detail card
            document.getElementById('flightDetailCard').classList.add('active');
        }

        function updateFlightDetail(flight) {
            const origin = AIRPORTS[flight.origin];
            const destination = AIRPORTS[flight.destination];
            const airline = AIRLINES[flight.airline];

            document.getElementById('detailFlightNumber').textContent = flight.number;
            document.getElementById('detailAirlineName').textContent = airline.name;
            document.getElementById('detailCallsign').textContent = airline.callsign;

            document.getElementById('detailOriginCode').textContent = flight.origin;
            document.getElementById('detailOriginCity').textContent = origin.name;
            document.getElementById('detailDestCode').textContent = flight.destination;
            document.getElementById('detailDestCity').textContent = destination.name;

            const depTime = flight.departureTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            const arrTime = flight.arrivalTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('detailDepartureTime').textContent = depTime;
            document.getElementById('detailArrivalTime').textContent = arrTime;

            const progressPercent = Math.round(flight.progress);
            document.getElementById('detailProgress').textContent = `${progressPercent}%`;
            document.getElementById('detailProgressBar').style.width = `${progressPercent}%`;

            document.getElementById('detailAltitude').textContent = Math.round(flight.altitude);
            document.getElementById('detailSpeed').textContent = Math.round(flight.speed);
            document.getElementById('detailHeading').textContent = Math.round(flight.heading);
            document.getElementById('detailAircraft').textContent = flight.aircraft;
            document.getElementById('detailPassengers').textContent = flight.passengers;

            const pos = getInterpolatedPosition(flight);
            document.getElementById('detailCoordinates').textContent = `${pos.lat.toFixed(4)}, ${pos.lng.toFixed(4)}`;

            // Status badge
            const statusBadge = document.getElementById('detailStatus');
            statusBadge.textContent = flight.status.toUpperCase();
            statusBadge.className = 'status-badge status-' + flight.status.toLowerCase().replace(/\s+/g, '-');
        }

        // ===== MAP RENDERING =====
        function initMap() {
            map = L.map('map', {
                center: [16, -65],
                zoom: 6,
                layers: [L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© CartoDB',
                    subdomains: 'abcd',
                    maxZoom: 19
                })]
            });

            // Add airport markers
            for (let code in AIRPORTS) {
                const airport = AIRPORTS[code];
                const markerIcon = L.divIcon({
                    html: '<div class="airport-marker"></div>',
                    className: '',
                    iconSize: [12, 12],
                    iconAnchor: [6, 6]
                });

                airportMarkers[code] = L.marker([airport.lat, airport.lng], { icon: markerIcon }).addTo(map);
            }
        }

        function updateFlightMarkers() {
            for (let flight of flights) {
                const pos = getInterpolatedPosition(flight);

                if (flightMarkers[flight.number]) {
                    flightMarkers[flight.number].setLatLng([pos.lat, pos.lng]).setRotationAngle(flight.heading);
                } else {
                    const markerIcon = L.divIcon({
                        html: `<div class="plane-marker" style="transform: rotate(${flight.heading}deg);">✈</div>`,
                        className: '',
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    });

                    flightMarkers[flight.number] = L.marker([pos.lat, pos.lng], { icon: markerIcon }).addTo(map);
                }

                // Update route line
                if (!routePolylines[flight.number]) {
                    const origin = AIRPORTS[flight.origin];
                    const destination = AIRPORTS[flight.destination];
                    const polyline = L.polyline(
                        [[origin.lat, origin.lng], [destination.lat, destination.lng]],
                        { color: '#7b61ff', weight: 2, dashArray: '5, 5', opacity: 0.6 }
                    ).addTo(map);
                    routePolylines[flight.number] = polyline;
                }
            }
        }

        // ===== TICKER =====
        function updateTicker() {
            const tickerContent = document.getElementById('tickerContent');
            const activeFlight = flights.slice(0, 10).map(flight => {
                const airline = AIRLINES[flight.airline];
                const route = `${flight.origin}→${flight.destination}`;
                return `
                    <div class="ticker-flight" data-flight="${flight.number}" onclick="selectFlight('${flight.number}')">
                        <div class="ticker-flight-number">${flight.number}</div>
                        <div class="ticker-flight-route">${route}</div>
                    </div>
                `;
            }).join('');

            tickerContent.innerHTML = activeFlight;
        }

        // ===== ANIMATION LOOP =====
        function animationLoop() {
            // Update flight positions
            for (let flight of flights) {
                if (flight.status === 'En route') {
                    flight.progress += 0.05;
                    if (flight.progress > 100) flight.progress = 100;
                }
            }

            updateFlightMarkers();

            if (selectedFlightNumber) {
                const flight = flights.find(f => f.number === selectedFlightNumber);
                if (flight) {
                    updateFlightDetail(flight);
                }
            }

            animationFrameId = requestAnimationFrame(animationLoop);
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('searchInput').addEventListener('input', (e) => {
            updateSuggestions(e.target.value);
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const filtered = filterFlights(e.target.value);
                if (filtered.length > 0) {
                    selectFlight(filtered[0].number);
                    document.getElementById('suggestionsDropdown').classList.remove('active');
                }
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('suggestionsDropdown').classList.remove('active');
            }
        });

        document.getElementById('closeDetailBtn').addEventListener('click', () => {
            document.getElementById('flightDetailCard').classList.remove('active');
            selectedFlightNumber = null;
        });

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            generateFlights();
            updateFlightMarkers();
            updateTicker();
            animationLoop();
        });
    </script>
</body>
