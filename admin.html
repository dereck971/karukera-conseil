<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCI Admin — Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#0b1526;--navy-light:#1a2940;--gold:#c2a060;--gold-light:#d4b87a;--green:#2a9d6c;--red:#c43b2e;--orange:#d48a1a;--bg:#f7f7f5;--surface:#fff;--border:#e8e8e4;--text:#1a1a1a;--text-2:#6b6b65;--text-3:#9c9c94;--ff:'Inter',-apple-system,system-ui,sans-serif;--radius:8px;--radius-md:14px}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--ff);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6}
    .header{background:var(--navy);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
    .header h1{color:var(--gold);font-size:1rem;font-weight:300;letter-spacing:3px}
    .header span{color:rgba(255,255,255,.4);font-size:.7rem}
    .container{max-width:1000px;margin:0 auto;padding:24px}
    .login-card{max-width:400px;margin:80px auto;background:var(--surface);border-radius:var(--radius-md);padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
    .login-card h2{font-size:1.1rem;margin-bottom:20px;color:var(--text)}
    .login-card input{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;font-family:var(--ff);margin-bottom:12px}
    .login-card button{width:100%;padding:12px;background:var(--gold);color:var(--navy);border:0;border-radius:var(--radius);font-size:.88rem;font-weight:600;cursor:pointer}
    .login-card button:hover{background:var(--gold-light)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
    .stat-card{background:var(--surface);border-radius:var(--radius-md);padding:20px;border:1px solid var(--border)}
    .stat-num{font-size:2rem;font-weight:800;color:var(--navy);line-height:1}
    .stat-label{font-size:.7rem;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
    .report-list{background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--border);overflow:hidden}
    .report-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .report-header h2{font-size:.95rem;font-weight:700}
    .report-row{padding:16px 20px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 80px 80px 100px 140px;align-items:center;gap:12px;font-size:.82rem}
    .report-row:last-child{border-bottom:none}
    .report-row:hover{background:rgba(194,160,96,.03)}
    .badge{display:inline-block;padding:3px 10px;border-radius:100px;font-size:.65rem;font-weight:600;letter-spacing:.5px}
    .badge-pending{background:#FEF3C7;color:#92400E}
    .badge-approved{background:#D1FAE5;color:#065F46}
    .badge-rejected{background:#FEE2E2;color:#991B1B}
    .score-circle{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;font-weight:700;font-size:.82rem;color:#fff}
    .score-green{background:var(--green)}
    .score-orange{background:var(--orange)}
    .score-red{background:var(--red)}
    .plan-badge{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--gold)}
    .empty{padding:48px 20px;text-align:center;color:var(--text-3);font-size:.88rem}
    .refresh-btn{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:var(--radius);font-size:.75rem;color:var(--text-2);cursor:pointer;font-family:var(--ff)}
    .refresh-btn:hover{border-color:var(--gold);color:var(--gold)}
    .actions a{display:inline-block;padding:4px 10px;border-radius:4px;font-size:.7rem;font-weight:600;text-decoration:none;margin-right:4px}
    .btn-approve{background:var(--green);color:#fff}
    .btn-reject{background:#F3F4F6;color:#374151;border:1px solid #E5E7EB}
    .time-ago{font-size:.7rem;color:var(--text-3)}
    @media(max-width:768px){
      .stats-grid{grid-template-columns:repeat(2,1fr)}
      .report-row{grid-template-columns:1fr;gap:8px}
    }
  </style>
</head>
<body>

<div class="header">
  <h1>KCI ADMIN</h1>
  <span id="admin-email"></span>
</div>

<!-- Login screen -->
<div id="login-screen">
  <div class="login-card">
    <h2>Accès administrateur</h2>
    <p style="font-size:.82rem;color:var(--text-2);margin-bottom:20px;">Entrez le secret admin pour accéder au dashboard.</p>
    <input type="password" id="admin-secret" placeholder="ADMIN_SECRET" autofocus>
    <button onclick="doLogin()">Accéder</button>
    <p id="login-error" style="color:var(--red);font-size:.78rem;margin-top:12px;display:none;">Secret invalide.</p>
  </div>
</div>

<!-- Dashboard (hidden until login) -->
<div id="dashboard" style="display:none;">
  <div class="container">

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card">
        <div class="stat-num" id="stat-pending">-</div>
        <div class="stat-label">En attente</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-approved">-</div>
        <div class="stat-label">Approuvés</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-rejected">-</div>
        <div class="stat-label">Refusés</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-total">-</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <div class="report-list">
      <div class="report-header">
        <h2>Rapports</h2>
        <button class="refresh-btn" onclick="loadReports()">Rafraîchir</button>
      </div>
      <div id="reports-container">
        <div class="empty">Chargement...</div>
      </div>
    </div>

  </div>
</div>

<script>
  let adminSecret = '';

  function doLogin() {
    adminSecret = document.getElementById('admin-secret').value.trim();
    if (!adminSecret) return;
    loadReports().then(ok => {
      if (ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    });
  }

  document.getElementById('admin-secret').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function loadReports() {
    try {
      const res = await fetch('/api/pending', {
        headers: { 'Authorization': `Bearer ${adminSecret}` }
      });
      if (!res.ok) return false;
      const data = await res.json();
      renderReports(data.reports || []);
      return true;
    } catch (err) {
      console.error('Load failed:', err);
      return false;
    }
  }

  function renderReports(reports) {
    const container = document.getElementById('reports-container');

    // Stats
    const pending = reports.filter(r => r.status === 'pending' || !r.status).length;
    const approved = reports.filter(r => r.status === 'approved').length;
    const rejected = reports.filter(r => r.status === 'rejected').length;
    document.getElementById('stat-pending').textContent = pending;
    document.getElementById('stat-approved').textContent = approved;
    document.getElementById('stat-rejected').textContent = rejected;
    document.getElementById('stat-total').textContent = reports.length;

    if (reports.length === 0) {
      container.innerHTML = '<div class="empty">Aucun rapport en attente. Les rapports apparaissent ici après paiement client.</div>';
      return;
    }

    container.innerHTML = reports.map(r => {
      const score = r.score || 0;
      const scoreClass = score >= 7 ? 'score-green' : score >= 5 ? 'score-orange' : 'score-red';
      const statusBadge = r.status === 'approved'
        ? '<span class="badge badge-approved">Approuvé</span>'
        : r.status === 'rejected'
        ? '<span class="badge badge-rejected">Refusé</span>'
        : '<span class="badge badge-pending">En attente</span>';
      const planLabel = { essentielle: '49€', recommandee: '129€', premium: '299€' };
      const timeAgo = r.createdAt ? formatTimeAgo(r.createdAt) : '';

      return `<div class="report-row">
        <div>
          <strong>${escapeHtml(r.clientName || 'Client')}</strong><br>
          <span style="font-size:.72rem;color:var(--text-3);">${escapeHtml(r.clientEmail || '')}</span>
        </div>
        <div>
          <span style="font-weight:600;">${escapeHtml(r.commune || 'N/A')}</span><br>
          <span class="plan-badge">${escapeHtml(planLabel[r.plan] || r.plan || '')}</span>
        </div>
        <div style="text-align:center;">
          <span class="score-circle ${scoreClass}">${score}</span>
        </div>
        <div>${statusBadge}</div>
        <div class="time-ago">${timeAgo}</div>
        <div class="actions">
          ${!r.status || r.status === 'pending' ? `
            <a href="/api/validate?id=${r.id}&action=approve&token=MANUAL" class="btn-approve">Approuver</a>
            <a href="/api/validate?id=${r.id}&action=reject&token=MANUAL" class="btn-reject">Refuser</a>
          ` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function formatTimeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const hours = Math.floor(diff / 3600000);
    if (hours < 1) return 'Il y a ' + Math.floor(diff / 60000) + ' min';
    if (hours < 24) return 'Il y a ' + hours + 'h';
    return 'Il y a ' + Math.floor(hours / 24) + 'j';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
