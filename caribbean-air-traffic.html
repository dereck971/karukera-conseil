<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caribbean Air Traffic Live Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0a0e1a; color:#e0e6f0; overflow:hidden; height:100vh; }

/* ─── HEADER ─── */
.header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:linear-gradient(135deg,#0d1321 0%,#1a1f35 100%);
  border-bottom:1px solid rgba(0,194,255,.15);
  padding:10px 24px; display:flex; align-items:center; justify-content:space-between;
  backdrop-filter:blur(20px); height:56px;
}
.header-left { display:flex; align-items:center; gap:14px; }
.logo { font-size:22px; font-weight:800; background:linear-gradient(135deg,#00c2ff,#7b61ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-.5px; }
.logo-sub { font-size:11px; color:#6b7394; font-weight:500; letter-spacing:1px; text-transform:uppercase; }
.live-badge { background:#ff3b5c; color:#fff; font-size:10px; font-weight:700;
  padding:3px 10px; border-radius:20px; animation:pulse 2s infinite; letter-spacing:1px; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
.stats-bar { display:flex; gap:24px; }
.stat { text-align:center; }
.stat-val { font-size:18px; font-weight:700; color:#00c2ff; }
.stat-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:1px; }

/* ─── MAP ─── */
#map { position:fixed; top:56px; left:0; right:0; bottom:0; z-index:1; }

/* ─── SIDEBAR ─── */
.sidebar {
  position:fixed; top:56px; right:0; bottom:0; width:420px; z-index:900;
  background:rgba(13,19,33,.95); backdrop-filter:blur(30px);
  border-left:1px solid rgba(0,194,255,.1);
  overflow-y:auto; transition:transform .3s ease;
}
.sidebar.hidden { transform:translateX(100%); }
.sidebar-tabs { display:flex; border-bottom:1px solid rgba(255,255,255,.06); }
.sidebar-tab {
  flex:1; padding:14px 8px; text-align:center; font-size:11px; font-weight:600;
  text-transform:uppercase; letter-spacing:1px; color:#6b7394; cursor:pointer;
  border-bottom:2px solid transparent; transition:all .2s;
}
.sidebar-tab:hover { color:#a0aacc; }
.sidebar-tab.active { color:#00c2ff; border-bottom-color:#00c2ff; }
.sidebar-content { padding:16px; }

.toggle-sidebar {
  position:fixed; right:420px; top:72px; z-index:901;
  background:rgba(13,19,33,.9); border:1px solid rgba(0,194,255,.2);
  color:#00c2ff; width:32px; height:32px; border-radius:8px 0 0 8px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:all .3s;
}
.toggle-sidebar.shifted { right:0; }

/* ─── FLIGHT CARDS ─── */
.flight-card {
  background:linear-gradient(135deg,rgba(26,31,53,.8),rgba(20,25,45,.9));
  border:1px solid rgba(0,194,255,.08); border-radius:12px;
  padding:14px; margin-bottom:10px; cursor:pointer;
  transition:all .2s;
}
.flight-card:hover { border-color:rgba(0,194,255,.3); transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,.3); }
.flight-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.flight-number { font-size:16px; font-weight:700; color:#fff; }
.flight-airline-tag { font-size:10px; padding:3px 8px; border-radius:6px; font-weight:600; }
.flight-route { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.flight-airport { text-align:center; }
.flight-iata { font-size:20px; font-weight:800; color:#fff; }
.flight-city { font-size:10px; color:#6b7394; }
.flight-time { font-size:11px; color:#a0aacc; font-weight:500; }
.flight-line { flex:1; position:relative; height:2px; background:rgba(255,255,255,.1); }
.flight-line::after { content:'✈'; position:absolute; top:-8px; font-size:14px;
  color:#00c2ff; animation:flyAcross 3s infinite linear; }
@keyframes flyAcross { 0%{left:0} 100%{left:calc(100% - 14px)} }
.flight-details { display:flex; gap:12px; flex-wrap:wrap; }
.flight-detail { display:flex; flex-direction:column; }
.flight-detail-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:.5px; }
.flight-detail-value { font-size:12px; color:#c8d0e8; font-weight:500; }
.flight-status { padding:2px 8px; border-radius:4px; font-size:10px; font-weight:600; }
.status-enroute { background:rgba(0,194,255,.15); color:#00c2ff; }
.status-landing { background:rgba(255,170,0,.15); color:#ffaa00; }
.status-boarding { background:rgba(123,97,255,.15); color:#7b61ff; }
.status-departed { background:rgba(0,214,143,.15); color:#00d68f; }
.status-delayed { background:rgba(255,59,92,.15); color:#ff3b5c; }

/* ─── AIRLINE CARDS ─── */
.airline-card {
  background:linear-gradient(135deg,rgba(26,31,53,.8),rgba(20,25,45,.9));
  border:1px solid rgba(0,194,255,.08); border-radius:14px;
  padding:18px; margin-bottom:12px; cursor:pointer; transition:all .2s;
}
.airline-card:hover { border-color:rgba(0,194,255,.3); }
.airline-header { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.airline-logo { width:48px; height:48px; border-radius:12px; display:flex;
  align-items:center; justify-content:center; font-size:20px; font-weight:800; color:#fff; }
.airline-name { font-size:16px; font-weight:700; color:#fff; }
.airline-iata { font-size:12px; color:#6b7394; font-weight:500; }
.airline-country { font-size:11px; color:#a0aacc; }
.airline-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:14px; }
.airline-stat { background:rgba(0,0,0,.2); padding:10px; border-radius:8px; text-align:center; }
.airline-stat-val { font-size:18px; font-weight:700; color:#00c2ff; }
.airline-stat-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:.5px; }
.airline-routes { display:flex; flex-wrap:wrap; gap:6px; }
.airline-route-tag { background:rgba(123,97,255,.1); color:#7b61ff; padding:3px 8px;
  border-radius:6px; font-size:10px; font-weight:500; }
.airline-detail-section { margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,.05); }
.airline-detail-title { font-size:11px; color:#6b7394; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
.airline-fleet { display:flex; flex-wrap:wrap; gap:6px; }
.fleet-tag { background:rgba(0,194,255,.08); color:#00c2ff; padding:3px 8px;
  border-radius:6px; font-size:10px; font-weight:500; }

/* ─── AIRPORT CARDS ─── */
.airport-card {
  background:linear-gradient(135deg,rgba(26,31,53,.8),rgba(20,25,45,.9));
  border:1px solid rgba(0,194,255,.08); border-radius:14px;
  padding:18px; margin-bottom:12px; cursor:pointer; transition:all .2s;
}
.airport-card:hover { border-color:rgba(0,194,255,.3); }
.airport-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.airport-iata-big { font-size:28px; font-weight:900; color:#fff; line-height:1; }
.airport-name { font-size:13px; color:#a0aacc; font-weight:500; max-width:220px; }
.airport-location { font-size:11px; color:#6b7394; }
.airport-badge { padding:4px 10px; border-radius:8px; font-size:10px; font-weight:600; }
.badge-hub { background:rgba(255,170,0,.15); color:#ffaa00; }
.badge-intl { background:rgba(0,194,255,.15); color:#00c2ff; }
.badge-regional { background:rgba(123,97,255,.15); color:#7b61ff; }
.airport-stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin:12px 0; }
.airport-stat { background:rgba(0,0,0,.2); padding:10px; border-radius:8px; text-align:center; }
.airport-stat-val { font-size:16px; font-weight:700; color:#00c2ff; }
.airport-stat-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:.5px; }
.airport-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.airport-info-item { }
.airport-info-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:.5px; }
.airport-info-value { font-size:12px; color:#c8d0e8; font-weight:500; }
.airport-airlines { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
.airport-airline-tag { padding:3px 8px; border-radius:6px; font-size:10px; font-weight:500; }

/* ─── FLIGHT DETAIL PANEL ─── */
.flight-detail-panel {

  background:rgba(10,14,26,.97); backdrop-filter:blur(30px);
  border-right:1px solid rgba(0,194,255,.1);

  padding:24px;

.flight-detail-panel.open { transform:translateX(0); }

.detail-flight-num { font-size:28px; font-weight:900; color:#fff; margin-bottom:4px; }
.detail-airline { font-size:14px; color:#a0aacc; margin-bottom:20px; }
.detail-route-visual { display:flex; align-items:center; gap:16px; margin:20px 0;
  padding:20px; background:rgba(0,0,0,.2); border-radius:12px; }
.detail-apt { text-align:center; }
.detail-apt-iata { font-size:24px; font-weight:800; color:#fff; }
.detail-apt-name { font-size:10px; color:#6b7394; max-width:100px; }
.detail-apt-time { font-size:13px; color:#00c2ff; font-weight:600; margin-top:4px; }
.detail-route-line { flex:1; text-align:center; }
.detail-duration { font-size:12px; color:#a0aacc; }
.detail-plane-icon { font-size:24px; color:#00c2ff; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:20px 0; }
.detail-item { }
.detail-item-label { font-size:9px; color:#6b7394; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.detail-item-value { font-size:14px; color:#e0e6f0; font-weight:600; }
.progress-bar { height:6px; background:rgba(255,255,255,.06); border-radius:3px; margin:20px 0; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,#00c2ff,#7b61ff); transition:width 1s; }

/* ─── SEARCH ─── */
.search-box { position:relative; margin-bottom:16px; }
.search-box input { width:100%; padding:10px 14px 10px 36px; background:rgba(0,0,0,.3);
  border:1px solid rgba(255,255,255,.06); border-radius:10px; color:#e0e6f0;
  font-size:13px; font-family:inherit; outline:none; transition:border-color .2s; }
.search-box input:focus { border-color:rgba(0,194,255,.3); }
.search-box input::placeholder { color:#4a5070; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#4a5070; font-size:14px; }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,194,255,.2); border-radius:3px; }

/* ─── MAP CUSTOM ─── */
.leaflet-popup-content-wrapper { background:rgba(13,19,33,.95)!important; color:#e0e6f0!important;
  border:1px solid rgba(0,194,255,.2)!important; border-radius:12px!important;
  backdrop-filter:blur(20px); box-shadow:0 12px 40px rgba(0,0,0,.5)!important; }
.leaflet-popup-tip { background:rgba(13,19,33,.95)!important; border:1px solid rgba(0,194,255,.2)!important; }
.leaflet-popup-content { margin:12px 16px!important; font-family:'Inter',sans-serif!important; }

.airport-marker {
  background:rgba(0,194,255,.15); border:2px solid #00c2ff;
  border-radius:50%; width:12px; height:12px;
  box-shadow:0 0 12px rgba(0,194,255,.4);
}
.airport-marker-hub {
  background:rgba(255,170,0,.2); border:2px solid #ffaa00;
  border-radius:50%; width:16px; height:16px;
  box-shadow:0 0 16px rgba(255,170,0,.4);
}

.plane-icon { transition:transform .5s linear; }

/* Responsive */
@media(max-width:900px){
  .sidebar { width:100%; top:auto; bottom:0; height:50vh; border-left:none; border-top:1px solid rgba(0,194,255,.1); }
  .toggle-sidebar { display:none; }
  .flight-detail-panel { width:100%; }
}
</style>
</head>

// DATA: SIMULATED FLIGHTS
// ═══════════════════════════════════════════════════════════════
const aircraftTypes = ["A350-900","A330-300","B737-800","A321neo","ATR 72-600","B787-9","B777-200","DHC-6","A320neo","E190","A350-1000","B757-200","A330-900neo"];
const statuses = ["En route","En route","En route","En route","Approche","Embarquement","Décollé","Retardé"];
const statusClasses = { "En route":"enroute","Approche":"landing","Embarquement":"boarding","Décollé":"departed","Retardé":"delayed" };

function generateFlightNumber(airlineIata) {
  return airlineIata + Math.floor(Math.random()*9000+1000);
}

function randomFrom(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function getAirportByIata(iata) { return airports.find(a=>a.iata===iata); }

function parseRoute(route) {
  const [from,to] = route.split('→');
  return {from,to};
}

function generateFlights() {
  const flights = [];
  const now = new Date();

  airlines.forEach(airline => {
    airline.caribRoutes.forEach((route,i) => {
      const {from,to} = parseRoute(route);
      const depAirport = getAirportByIata(from);
      const arrAirport = getAirportByIata(to);
      if(!depAirport || !arrAirport) return;

      // Generate 1-2 flights per route
      const count = Math.random() > 0.5 ? 2 : 1;
      for(let j=0; j<count; j++) {
        const status = randomFrom(statuses);
        const progress = status==="En route" ? Math.random()*0.6+0.2 :
                         status==="Approche" ? Math.random()*0.15+0.85 :
                         status==="Embarquement" ? 0 :
                         status==="Décollé" ? Math.random()*0.15 :
                         Math.random()*0.5;

        const depHour = Math.floor(Math.random()*24);
        const depMin = Math.floor(Math.random()*60);
        const duration = Math.floor(Math.random()*360+60); // 1h-7h
        const arrHour = (depHour + Math.floor(duration/60)) % 24;
        const arrMin = (depMin + duration%60) % 60;

        const lat = depAirport.lat + (arrAirport.lat - depAirport.lat) * progress;
        const lng = depAirport.lng + (arrAirport.lng - depAirport.lng) * progress;

        const alt = status==="Embarquement" ? 0 :
                    status==="Décollé" ? Math.floor(Math.random()*15000+3000) :
                    status==="Approche" ? Math.floor(Math.random()*8000+1000) :
                    Math.floor(Math.random()*12000+28000);
        const speed = status==="Embarquement" ? 0 :
                      status==="Décollé" ? Math.floor(Math.random()*200+150) :
                      status==="Approche" ? Math.floor(Math.random()*100+180) :
                      Math.floor(Math.random()*100+750);

        const pax = Math.floor(Math.random()*180+40);

        flights.push({
          id: generateFlightNumber(airline.iata) + '-' + j,
          flightNumber: generateFlightNumber(airline.iata),
          airline: airline.iata,
          airlineName: airline.name,
          airlineColor: airline.color,
          from: from, to: to,
          fromName: depAirport.name, toName: arrAirport.name,
          fromCity: depAirport.city, toCity: arrAirport.city,
          depTime: `${String(depHour).padStart(2,'0')}:${String(depMin).padStart(2,'0')}`,
          arrTime: `${String(arrHour).padStart(2,'0')}:${String(arrMin).padStart(2,'0')}`,
          duration: `${Math.floor(duration/60)}h${String(duration%60).padStart(2,'0')}`,
          status: status,
          progress: progress,
          lat: lat, lng: lng,
          altitude: alt,
          speed: speed,
          aircraft: randomFrom(aircraftTypes),
          passengers: pax,
          heading: Math.atan2(arrAirport.lng-depAirport.lng, arrAirport.lat-depAirport.lat) * 180/Math.PI
        });
      }
    });
  });

  return flights;
}

function createPlaneIcon(heading, color) {
  return L.divIcon({
    html:`<div style="transform:rotate(${heading-90}deg);font-size:16px;color:${color};
      filter:drop-shadow(0 0 4px ${color}80);transition:transform .5s">✈</div>`,
    className:'plane-icon',
    iconSize:[20,20],
    iconAnchor:[10,10]
  });
}

  planeMarkers.forEach(m => map.removeLayer(m));

          <div><span style="color:#6b7394">Avion:</span> <span style="color:#fff">${f.aircraft}</span></div>
          <div><span style="color:#6b7394">Statut:</span> <span style="color:#00c2ff">${f.status}</span></div>
        </div>
      </div>`;
    marker.bindPopup(popup, {maxWidth:250});

    marker.on('click', () => showFlightDetail(f));
    planeMarkers.push(marker);

    // Route line
    const depApt = getAirportByIata(f.from);
    const arrApt = getAirportByIata(f.to);
    if(depApt && arrApt) {
      const line = L.polyline(

    <input type="text" placeholder="Rechercher un vol, une route..." id="flightSearch" oninput="filterFlights()">
  </div>`;

  const sorted = [...flights].sort((a,b) => {
    const order = {"En route":0,"Approche":1,"Décollé":2,"Embarquement":3,"Retardé":4};
    return (order[a.status]||5) - (order[b.status]||5);
  });

  const displayed = sorted.slice(0,60);

  displayed.forEach(f => {
    html += `
    <div class="flight-card" onclick="showFlightDetail(flights.find(x=>x.id==='${f.id}'))">
      <div class="flight-card-header">
        <span class="flight-number">${f.flightNumber}</span>
        <span class="flight-airline-tag" style="background:${f.airlineColor}20;color:${f.airlineColor}">${f.airlineName}</span>
      </div>
      <div class="flight-route">
        <div class="flight-airport">
          <div class="flight-iata">${f.from}</div>
          <div class="flight-city">${f.fromCity}</div>
          <div class="flight-time">${f.depTime}</div>
        </div>
        <div class="flight-line"></div>
        <div class="flight-airport">
          <div class="flight-iata">${f.to}</div>
          <div class="flight-city">${f.toCity}</div>
          <div class="flight-time">${f.arrTime}</div>
        </div>
      </div>
      <div class="flight-details">
        <div class="flight-detail">
          <span class="flight-detail-label">Avion</span>
          <span class="flight-detail-value">${f.aircraft}</span>
        </div>
        <div class="flight-detail">
          <span class="flight-detail-label">Altitude</span>
          <span class="flight-detail-value">${f.altitude.toLocaleString()} ft</span>
        </div>
        <div class="flight-detail">
          <span class="flight-detail-label">Vitesse</span>
          <span class="flight-detail-value">${f.speed} km/h</span>
        </div>
        <div class="flight-detail">
          <span class="flight-detail-label">Statut</span>
          <span class="flight-status status-${statusClasses[f.status]||'enroute'}">${f.status}</span>
        </div>
      </div>
    </div>`;
  });

  html += `<div style="text-align:center;padding:16px;color:#6b7394;font-size:12px">
    ${flights.length} vols actifs dans la Caraïbe</div>`;
  el.innerHTML = html;
}

        </div>
      </div>

  });

  el.innerHTML = html;
}

function renderAirports(el) {
  let html = `<div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Rechercher un aéroport..." id="airportSearch" oninput="filterAirports()">
  </div>`;

  const sorted = [...airports].sort((a,b) => {
    const order = {hub:0,intl:1,regional:2};
    return (order[a.type]||3) - (order[b.type]||3);
  });

  sorted.forEach(apt => {
    const badgeClass = apt.type==='hub'?'badge-hub':apt.type==='intl'?'badge-intl':'badge-regional';
    const badgeLabel = apt.type==='hub'?'HUB':apt.type==='intl'?'INTERNATIONAL':'RÉGIONAL';
    const arrivals = flights.filter(f=>f.to===apt.iata).length;
    const departures = flights.filter(f=>f.from===apt.iata).length;
    const airlineObjs = airlines.filter(a=>apt.airlines.includes(a.iata));

    html += `
    <div class="airport-card" onclick="map.flyTo([${apt.lat},${apt.lng}],10)">
      <div class="airport-header">
        <div>
          <div class="airport-iata-big">${apt.iata}</div>
          <div class="airport-name">${apt.name}</div>
          <div class="airport-location">${apt.city}, ${apt.country}</div>
        </div>
        <span class="airport-badge ${badgeClass}">${badgeLabel}</span>
      </div>

      <div class="airport-stats">
        <div class="airport-stat">
          <div class="airport-stat-val">${arrivals}</div>
          <div class="airport-stat-label">Arrivées</div>
        </div>
        <div class="airport-stat">
          <div class="airport-stat-val">${departures}</div>
          <div class="airport-stat-label">Départs</div>
        </div>
        <div class="airport-stat">
          <div class="airport-stat-val">${apt.paxYear}</div>
          <div class="airport-stat-label">Passagers/an</div>
        </div>
        <div class="airport-stat">
          <div class="airport-stat-val">${apt.movements.toLocaleString()}</div>
          <div class="airport-stat-label">Mouvements/an</div>
        </div>
      </div>

      <div class="airport-info-grid">
        <div class="airport-info-item">
          <div class="airport-info-label">ICAO</div>
          <div class="airport-info-value">${apt.icao}</div>
        </div>
        <div class="airport-info-item">
          <div class="airport-info-label">Élévation</div>
          <div class="airport-info-value">${apt.elevation}</div>
        </div>
        <div class="airport-info-item">
          <div class="airport-info-label">Fuseau</div>
          <div class="airport-info-value">${apt.timezone}</div>
        </div>
        <div class="airport-info-item">
          <div class="airport-info-label">Piste(s)</div>
          <div class="airport-info-value">${apt.runways.map(r=>r.id+' ('+r.length+')').join(', ')}</div>
        </div>
      </div>

      <div class="airline-detail-section">
        <div class="airline-detail-title">Compagnies desservant</div>
        <div class="airport-airlines">
          ${airlineObjs.map(a=>`<span class="airport-airline-tag" style="background:${a.color}20;color:${a.color}">${a.name}</span>`).join('')}
          ${apt.airlines.filter(code=>!airlines.find(a=>a.iata===code)).map(code=>`<span class="airport-airline-tag" style="background:rgba(255,255,255,.05);color:#6b7394">${code}</span>`).join('')}

  });

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════

    <button class="close-detail" onclick="closeDetail()">✕</button>
    <div class="detail-flight-num">${f.flightNumber}</div>
    <div class="detail-airline" style="color:${f.airlineColor}">${f.airlineName}</div>
    <span class="flight-status status-${statusClasses[f.status]||'enroute'}" style="font-size:12px;padding:4px 12px">${f.status}</span>

    <div class="detail-route-visual">
      <div class="detail-apt">
        <div class="detail-apt-iata">${f.from}</div>
        <div class="detail-apt-name">${f.fromName}</div>
        <div class="detail-apt-time">${f.depTime}</div>
      </div>
      <div class="detail-route-line">
        <div class="detail-plane-icon">✈</div>
        <div class="detail-duration">${f.duration}</div>

      <div class="detail-apt">

        <div class="detail-item-label">Vitesse</div>

      </div>

        <div class="detail-item-label">Durée totale</div>

    </div>

    <div class="airline-detail-section">
      <div class="airline-detail-title">Position actuelle</div>
      <div style="font-size:12px;color:#c8d0e8">

function closeDetail() {
  document.getElementById('flightDetail').classList.remove('open');
  selectedFlight = null;

// ═══════════════════════════════════════════════════════════════
// SEARCH FILTERS
// ═══════════════════════════════════════════════════════════════
function filterFlights() {
  const q = document.getElementById('flightSearch')?.value.toLowerCase() || '';
  document.querySelectorAll('.flight-card').forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function filterAirlines() {
  const q = document.getElementById('airlineSearch')?.value.toLowerCase() || '';
  document.querySelectorAll('.airline-card').forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function filterAirports() {
  const q = document.getElementById('airportSearch')?.value.toLowerCase() || '';
  document.querySelectorAll('.airport-card').forEach(card => {
    card.style.display = card.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

function toggleSidebar() {
  sidebarVisible = !sidebarVisible;
  document.getElementById('sidebar').classList.toggle('hidden');
  document.getElementById('toggleBtn').classList.toggle('shifted');
  document.getElementById('toggleBtn').textContent = sidebarVisible ? '▶' : '◀';
}

// ═══════════════════════════════════════════════════════════════
// LIVE SIMULATION
// ═══════════════════════════════════════════════════════════════
function updateStats() {
  document.getElementById('totalFlights').textContent = flights.length;
  document.getElementById('totalAirports').textContent = airports.length;
  document.getElementById('totalAirlines').textContent = airlines.length;
  const totalPax = flights.reduce((s,f)=>s+f.passengers, 0);
  document.getElementById('totalPax').textContent = totalPax.toLocaleString();
}

function simulateMovement() {
  flights.forEach(f => {
    if(f.status === "Embarquement") return;

    const depApt = getAirportByIata(f.from);
    const arrApt = getAirportByIata(f.to);
    if(!depApt || !arrApt) return;

    // Advance progress
    f.progress += (0.001 + Math.random()*0.002);
    if(f.progress >= 1) {
      f.progress = Math.random()*0.3;
      // Reset with possibly new status
      f.status = randomFrom(statuses);
    }

    // Update position
    f.lat = depApt.lat + (arrApt.lat - depApt.lat) * f.progress;
    f.lng = depApt.lng + (arrApt.lng - depApt.lng) * f.progress;

    // Update altitude based on progress
    if(f.progress < 0.1) {
      f.altitude = Math.floor(f.progress * 350000);
      f.speed = Math.floor(300 + f.progress * 5000);
    } else if(f.progress > 0.85) {
      f.altitude = Math.floor((1 - f.progress) * 230000);
      f.speed = Math.floor(200 + (1-f.progress)*3500);
    } else {
      f.altitude = Math.floor(30000 + Math.sin(f.progress*10)*5000);
      f.speed = Math.floor(800 + Math.sin(f.progress*7)*50);
    }

    if(f.progress > 0.85) f.status = "Approche";
    else if(f.progress < 0.1) f.status = "Décollé";
    else if(Math.random() < 0.001) f.status = "Retardé";
    else f.status = "En route";
  });

  renderPlanes();
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
renderPlanes();
renderSidebar();
updateStats();

// Live update every 3 seconds
setInterval(() => {
  simulateMovement();
  updateStats();
  // Refresh sidebar if on flights tab
  if(currentTab === 'flights') {
    const search = document.getElementById('flightSearch')?.value || '';
    renderFlights(document.getElementById('sidebarContent'));
    if(search) {
      const input = document.getElementById('flightSearch');
      if(input) { input.value = search; filterFlights(); }
    }
  }
}, 3000);

</script>
